<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi progreso · IUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <script src="../js/supabase-config.js"></script>
  <script src="../js/gamification-sdk.js"></script>
  <script src="../js/academic-rules.js"></script>
  <script src="../js/academic-status-bar.js"></script>
  <script src="../js/student-dashboard.js"></script>
  <script src="../js/celebration.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --primary:#1E2843; --accent:#2d3a5e; --gold:#FFDF2D; --green:#2e7d32; --muted:#546e7a; --border:#DEDFE4; --radius:12px; }
    body { font-family:'Open Sans', Arial, sans-serif; background:#F4F6FA; color:#212121; line-height:1.55; }
    header { background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; padding:1.4rem 1.2rem 1.8rem; }
    .wrap { max-width:1180px; margin:0 auto; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; }
    h1 { font-size:clamp(1.5rem,4vw,2.2rem); }
    header p { opacity:.88; margin-top:.35rem; }
    .nav { display:flex; gap:.5rem; flex-wrap:wrap; }
    .nav a { border:1px solid rgba(255,255,255,.35); border-radius:10px; padding:.5rem .85rem; color:#fff; font-weight:800; text-decoration:none; font-size:.84rem; }
    main { padding:1.2rem; }
    .panel { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:1rem; box-shadow:0 2px 10px rgba(0,0,0,.04); margin-bottom:1rem; }
    .dash-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; margin-bottom:1rem; }
    .dash-metric { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:1rem; }
    .dash-metric span { color:var(--muted); font-size:.75rem; font-weight:800; text-transform:uppercase; }
    .dash-metric strong { display:block; font-size:1.8rem; color:var(--primary); margin:.2rem 0; }
    .dash-metric small { color:var(--muted); font-size:.82rem; }
    .dash-overall h2, .dash-block h3 { color:var(--primary); font-size:1.05rem; margin-bottom:.7rem; }
    .dash-blocks { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1rem; }
    .dash-block { border-left:5px solid var(--block-accent, var(--gold)); }
    .dash-block-cut { background:linear-gradient(180deg,#fff,#fffef5); }
    .dash-weeks { display:grid; gap:.55rem; margin-top:.7rem; }
    .dash-week { display:block; text-decoration:none; color:inherit; border:1px solid var(--border); border-radius:10px; padding:.65rem .75rem; transition:transform .15s, box-shadow .15s; }
    .dash-week:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,.08); }
    .dash-week-top { display:flex; justify-content:space-between; font-size:.84rem; margin-bottom:.35rem; }
    .dash-week-top strong { color:var(--primary); }
    .dash-week-top span { color:var(--muted); font-weight:700; }
    .dash-week-disabled { opacity:.65; cursor:not-allowed; background:#f8f9fb; }
    .dash-week-disabled:hover { transform:none; box-shadow:none; }
    .xp-bar { height:10px; background:#E9EAED; border-radius:999px; overflow:hidden; margin-top:.25rem; }
    .xp-bar-fill { height:100%; border-radius:999px; transition:width .45s ease; }
    .dash-note { color:var(--muted); font-size:.88rem; margin-top:.6rem; }
    .course-bar { height:14px; background:#E9EAED; border-radius:999px; overflow:hidden; margin-top:.5rem; }
    .course-bar > div { height:100%; background:linear-gradient(90deg,var(--primary),var(--gold)); width:0%; transition:width .5s; }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div>
        <h1 id="dashTitle">Mi progreso</h1>
        <p id="studentLine">Cargando…</p>
      </div>
      <nav class="nav">
        <a href="../index.html">Inicio</a>
        <a href="participacion.html" hidden id="teacherLink">Docente</a>
      </nav>
    </div>
    <div class="wrap" style="margin-top:1rem">
      <div class="course-bar"><div id="courseXpBar"></div></div>
    </div>
  </header>
  <main class="wrap">
    <div id="attendance-panel"></div>
    <div id="academic-panels"></div>
    <div id="student-dashboard"></div>
  </main>
  <script>
    (function () {
      var dash = window.IUB_DASHBOARD || {};
      var title = document.getElementById("dashTitle");
      if (title) title.textContent = "Mi progreso · " + (dash.title || window.MODULE_CODE || "IUB");
      IUBStudentDashboard.render("student-dashboard");
    })();
  </script>
</body>
</html>
